version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mybrick-db
    restart: always
    environment:
      MYSQL_DATABASE: ConstructionSaaS
      MYSQL_USER: mybrick_user
      MYSQL_PASSWORD: MyBrick@2026
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mybrick-backend
    restart: always
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=ConstructionSaaS;User=mybrick_user;Password=MyBrick@2026;
      - Jwt__Key=super_secret_jwt_key_for_mybrick_construction_platform_2026
    ports:
      - "5154:5154"
    volumes:
      - ./backend/wwwroot/uploads:/app/wwwroot/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mybrick-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus:latest
    container_name: mybrick-prometheus
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    depends_on:
      - backend

volumes:
  db_data:
