apiVersion: v1
kind: Service
metadata:
  name: mybrick-backend-svc
  namespace: production
spec:
  type: NodePort
  selector:
    app: mybrick-backend
  ports:
    - port: 5154
      targetPort: 5154
      nodePort: 30154
---
apiVersion: v1
kind: Service
metadata:
  name: mybrick-frontend-svc
  namespace: production
spec:
  type: NodePort
  selector:
    app: mybrick-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
