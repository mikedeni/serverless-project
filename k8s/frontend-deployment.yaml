apiVersion: apps/v1
kind: Deployment
metadata:
  name: mybrick-frontend
  namespace: production
  labels:
    app: mybrick-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mybrick-frontend
  template:
    metadata:
      labels:
        app: mybrick-frontend
    spec:
      containers:
        - name: mybrick-frontend
          image: mikedeni/mybrick-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
